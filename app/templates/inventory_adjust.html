{% extends "base.html" %}
{% block main %}
<div class="page-header">
    <div class="page-eyebrow">Operations</div>
    <div class="page-title">Inventory Adjustment</div>
</div>

<div style="display: grid; grid-template-columns: 400px 1fr; gap: 2rem;">
    <div style="background: var(--ink2); padding: 2rem; border: 1px solid var(--border);">
        <label class="page-eyebrow">Find Book</label>
        <input type="text" id="search" placeholder="Type title or author..." style="margin-bottom: 1.5rem;">
        
        <div id="selected-book" style="display:none; margin-bottom: 2rem; padding: 1rem; background: var(--ink);">
            <div id="book-name" style="color: var(--gold); font-weight: 500;"></div>
            <div id="book-current-qty" style="font-size: .8rem; color: var(--muted);"></div>
        </div>

        <label class="page-eyebrow">New Quantity</label>
        <input type="number" id="new_qty" style="margin-bottom: 1.5rem;">

        <label class="page-eyebrow">Reason</label>
        <select id="reason" style="margin-bottom: 2rem;">
            <option>Restock</option>
            <option>Damaged</option>
            <option>Correction</option>
        </select>

        <button onclick="submitAdjust()" class="btn-primary-dark" style="width:100%;">Commit Change</button>
    </div>

    <div style="background: var(--ink2); border: 1px solid var(--border);">
        <table class="modern-table">
            <thead>
                <tr><th>Book</th><th>Adjustment</th><th>Reason</th><th>Date</th></tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Include your existing fetch logic here, ensuring the template 
    // literal uses the .badge-gold and .modern-table classes.
</script>
{% endblock %}
