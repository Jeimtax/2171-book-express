{% extends "base.html" %}

{% block main %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="mb-1">Adjust Inventory</h2>
        <p class="text-muted mb-0">Manually correct stock levels and record the reason for every change.</p>
    </div>
</div>

<div class="row g-4">

    <!-- ── Adjustment Form ───────────────────────────────────────── -->
    <div class="col-lg-5">
        <div class="card shadow-sm border-0 h-100">
            <div class="card-header bg-white border-bottom py-3">
                <h5 class="mb-0 fw-semibold">Make an Adjustment</h5>
            </div>
            <div class="card-body p-4">

                <!-- Step 1: search / select book -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Search Book</label>
                    <input type="text" id="bookSearch" class="form-control" placeholder="Type title or author…">
                    <div id="searchResults" class="list-group mt-1" style="display:none; max-height:200px; overflow-y:auto; position:absolute; z-index:999; width:calc(100% - 3rem);"></div>
                </div>

                <!-- Selected book preview -->
                <div id="selectedBookCard" class="alert alert-primary d-none mb-3 py-2 px-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="fw-bold" id="selBookTitle">—</div>
                            <small class="text-muted" id="selBookMeta">—</small>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-white text-primary border border-primary">
                                Stock: <span id="selBookQty">—</span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Adjustment fields -->
                <div id="adjustFields" style="display:none;">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">New Quantity</label>
                        <input type="number" id="newQty" class="form-control" min="0" placeholder="Enter new stock level">
                        <div id="qtyDelta" class="form-text mt-1"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Reason</label>
                        <select id="reasonSelect" class="form-select">
                            <option value="">Loading reasons…</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Adjusted By <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="text" id="adjustedBy" class="form-control" placeholder="Your name">
                    </div>

                    <button id="submitBtn" class="btn btn-primary w-100 py-2">
                        <span id="submitLabel">Save Adjustment</span>
                        <span id="submitSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
                    </button>

                    <div id="formMsg" class="mt-3 d-none"></div>
                </div>

                <div id="noBookSelected" class="text-center text-muted py-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-search mb-2 opacity-50" viewBox="0 0 16 16">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.099zm-5.44 1.406a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11"/>
                    </svg>
                    <p class="mb-0 small">Search for a book above to begin</p>
                </div>

            </div>
        </div>
    </div>

    <!-- ── Adjustment History ────────────────────────────────────── -->
    <div class="col-lg-7">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-semibold">Adjustment History</h5>
                <button class="btn btn-sm btn-outline-secondary" id="refreshHistory">↻ Refresh</button>
            </div>
            <div class="card-body p-0">
                <div id="historyLoading" class="text-center py-5 text-muted">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div> Loading…
                </div>
                <div id="historyEmpty" class="text-center py-5 text-muted d-none">No adjustments recorded yet.</div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="historyTable" style="display:none;">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-3">Book</th>
                                <th>Change</th>
                                <th>Reason</th>
                                <th>By</th>
                                <th class="pe-3">Date</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div class="d-flex justify-content-between align-items-center px-3 py-2 border-top" id="historyPager" style="display:none!important;">
                    <small class="text-muted" id="historyCount"></small>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary" id="prevPage" disabled>‹ Prev</button>
                        <button class="btn btn-outline-secondary" id="nextPage">Next ›</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<style>
    .delta-positive { color: #198754; font-weight: 600; }
    .delta-negative { color: #dc3545; font-weight: 600; }
    .delta-neutral  { color: #6c757d; }
    #searchResults .list-group-item { cursor: pointer; font-size: .9rem; }
    #searchResults .list-group-item:hover { background: #e8f0fe; }
</style>

<script>
(function () {
    /* ── State ─────────────────────────────────────── */
    let selectedBook = null;
    let currentPage = 1;
    const perPage = 15;

    /* ── Elements ──────────────────────────────────── */
    const bookSearch      = document.getElementById('bookSearch');
    const searchResults   = document.getElementById('searchResults');
    const selectedCard    = document.getElementById('selectedBookCard');
    const selTitle        = document.getElementById('selBookTitle');
    const selMeta         = document.getElementById('selBookMeta');
    const selQty          = document.getElementById('selBookQty');
    const adjustFields    = document.getElementById('adjustFields');
    const noBookSel       = document.getElementById('noBookSelected');
    const newQtyInput     = document.getElementById('newQty');
    const qtyDelta        = document.getElementById('qtyDelta');
    const reasonSelect    = document.getElementById('reasonSelect');
    const adjustedBy      = document.getElementById('adjustedBy');
    const submitBtn       = document.getElementById('submitBtn');
    const submitLabel     = document.getElementById('submitLabel');
    const submitSpinner   = document.getElementById('submitSpinner');
    const formMsg         = document.getElementById('formMsg');
    const historyLoading  = document.getElementById('historyLoading');
    const historyEmpty    = document.getElementById('historyEmpty');
    const historyTable    = document.getElementById('historyTable');
    const historyBody     = document.getElementById('historyBody');
    const historyPager    = document.getElementById('historyPager');
    const historyCount    = document.getElementById('historyCount');
    const prevPageBtn     = document.getElementById('prevPage');
    const nextPageBtn     = document.getElementById('nextPage');

    /* ── Load Reasons ──────────────────────────────── */
    fetch('/inventory/reasons')
        .then(r => r.json())
        .then(data => {
            reasonSelect.innerHTML = '<option value="">— Select a reason —</option>' +
                data.reasons.map(r => `<option value="${r}">${r}</option>`).join('');
        });

    /* ── Book Search ───────────────────────────────── */
    let searchTimeout;
    bookSearch.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        const q = bookSearch.value.trim();
        if (q.length < 2) { searchResults.style.display = 'none'; return; }
        searchTimeout = setTimeout(() => {
            fetch(`/books/search?q=${encodeURIComponent(q)}`)
                .then(r => r.json())
                .then(books => renderSearchResults(books))
                .catch(() => {});
        }, 300);
    });

    document.addEventListener('click', e => {
        if (!bookSearch.contains(e.target)) searchResults.style.display = 'none';
    });

    function renderSearchResults(books) {
        if (!books.length) {
            searchResults.innerHTML = '<div class="list-group-item text-muted">No books found</div>';
        } else {
            searchResults.innerHTML = books.map(b =>
                `<button class="list-group-item list-group-item-action" data-id="${b.id}"
                    data-title="${b.title}" data-author="${b.author}"
                    data-qty="${b.quantity}" data-grade="${b.grade || ''}" data-subject="${b.subject || ''}">
                    <div class="fw-semibold">${b.title}</div>
                    <small class="text-muted">${b.author} · Stock: ${b.quantity}</small>
                </button>`
            ).join('');
            searchResults.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => selectBook(btn.dataset));
            });
        }
        searchResults.style.display = 'block';
    }

    function selectBook(data) {
        selectedBook = { id: parseInt(data.id), quantity: parseInt(data.qty) };
        selTitle.textContent = data.title;
        selMeta.textContent  = `${data.author}${data.grade ? ' · Grade ' + data.grade : ''}${data.subject ? ' · ' + data.subject : ''}`;
        selQty.textContent   = data.qty;
        selectedCard.classList.remove('d-none');
        adjustFields.style.display = 'block';
        noBookSel.style.display    = 'none';
        searchResults.style.display = 'none';
        bookSearch.value = data.title;
        newQtyInput.value = '';
        qtyDelta.textContent = '';
        formMsg.classList.add('d-none');
    }

    /* ── Delta preview ─────────────────────────────── */
    newQtyInput.addEventListener('input', () => {
        if (!selectedBook) return;
        const nq = parseInt(newQtyInput.value);
        if (isNaN(nq)) { qtyDelta.textContent = ''; return; }
        const delta = nq - selectedBook.quantity;
        if (delta === 0) {
            qtyDelta.innerHTML = '<span class="delta-neutral">No change</span>';
        } else if (delta > 0) {
            qtyDelta.innerHTML = `<span class="delta-positive">+${delta} (restock)</span>`;
        } else {
            qtyDelta.innerHTML = `<span class="delta-negative">${delta} (removal)</span>`;
        }
    });

    /* ── Submit ────────────────────────────────────── */
    submitBtn.addEventListener('click', async () => {
        if (!selectedBook) return;
        const nq     = parseInt(newQtyInput.value);
        const reason = reasonSelect.value;

        if (isNaN(nq) || nq < 0) return showMsg('Please enter a valid quantity (0 or more).', 'danger');
        if (!reason) return showMsg('Please select a reason.', 'danger');

        submitLabel.textContent = 'Saving…';
        submitSpinner.classList.remove('d-none');
        submitBtn.disabled = true;

        try {
            const res = await fetch(`/inventory/adjust/${selectedBook.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    new_quantity: nq,
                    reason: reason,
                    adjusted_by: adjustedBy.value.trim() || null
                })
            });
            const data = await res.json();

            if (res.ok && data.success) {
                showMsg(data.message, 'success');
                // Update the card's stock badge
                selectedBook.quantity = nq;
                selQty.textContent = nq;
                newQtyInput.value  = '';
                qtyDelta.textContent = '';
                loadHistory(1);
            } else {
                showMsg(data.error || 'Something went wrong.', 'danger');
            }
        } catch (e) {
            showMsg('Network error. Please try again.', 'danger');
        } finally {
            submitLabel.textContent = 'Save Adjustment';
            submitSpinner.classList.add('d-none');
            submitBtn.disabled = false;
        }
    });

    function showMsg(text, type) {
        formMsg.className = `alert alert-${type} mt-3`;
        formMsg.textContent = text;
        formMsg.classList.remove('d-none');
    }

    /* ── History ───────────────────────────────────── */
    function loadHistory(page) {
        currentPage = page;
        historyLoading.style.display = 'block';
        historyTable.style.display   = 'none';
        historyEmpty.classList.add('d-none');
        historyPager.style.display   = 'none';

        fetch(`/inventory/adjustments?page=${page}&per_page=${perPage}`)
            .then(r => r.json())
            .then(data => {
                historyLoading.style.display = 'none';
                if (!data.data.length) {
                    historyEmpty.classList.remove('d-none');
                    return;
                }
                historyBody.innerHTML = data.data.map(a => {
                    const delta = a.adjustment;
                    const deltaClass = delta > 0 ? 'delta-positive' : delta < 0 ? 'delta-negative' : 'delta-neutral';
                    const deltaStr   = delta > 0 ? `+${delta}` : `${delta}`;
                    const date = new Date(a.created_at).toLocaleString('en-US', {
                        month: 'short', day: 'numeric', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                    return `<tr>
                        <td class="ps-3">
                            <div class="fw-semibold small">#${a.book_id}</div>
                        </td>
                        <td>
                            <span class="${deltaClass}">${deltaStr}</span>
                            <small class="text-muted d-block">${a.previous_quantity} → ${a.new_quantity}</small>
                        </td>
                        <td><span class="badge bg-light text-dark border">${a.reason}</span></td>
                        <td class="text-muted small">${a.adjusted_by || '—'}</td>
                        <td class="text-muted small pe-3">${date}</td>
                    </tr>`;
                }).join('');
                historyTable.style.display = 'table';
                historyPager.style.display = 'flex';
                historyCount.textContent   = `${data.total} record${data.total !== 1 ? 's' : ''}`;
                prevPageBtn.disabled = page <= 1;
                nextPageBtn.disabled = page >= data.pages;
            })
            .catch(() => { historyLoading.style.display = 'none'; });
    }

    prevPageBtn.addEventListener('click', () => loadHistory(currentPage - 1));
    nextPageBtn.addEventListener('click', () => loadHistory(currentPage + 1));
    document.getElementById('refreshHistory').addEventListener('click', () => loadHistory(currentPage));

    loadHistory(1);
})();
</script>
{% endblock %}
