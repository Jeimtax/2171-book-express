{% extends "base.html" %}

{% block main %}
<div class="dashboard-header" style="margin-bottom: 3rem;">
    <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem;">Inventory Overview</h1>
    <p style="color: var(--text-muted);">Real-time metrics and stock management.</p>
</div>

<div class="filter-bar">
    <input type="text" id="dashSearch" placeholder="Search by title or author..." style="flex: 2;">
    <select id="gradeFilter" style="flex: 1;">
        <option value="">All Grades</option>
        <option value="Grade 7">Grade 7</option>
        <option value="Grade 8">Grade 8</option>
        <option value="Grade 9">Grade 9</option>
    </select>
    <select id="subjectFilter" style="flex: 1;">
        <option value="">All Subjects</option>
        <option value="Math">Math</option>
        <option value="Science">Science</option>
        <option value="English">English</option>
    </select>
</div>

<div class="row g-4 mb-5">
    <div class="col-md-4">
        <div class="glass-card">
            <div style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold);">Total Stock</div>
            <div id="stat-total" style="font-size: 2rem; font-family: 'Playfair Display';">--</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="glass-card">
            <div style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold);">Inventory Value</div>
            <div id="stat-value" style="font-size: 2rem; font-family: 'Playfair Display';">--</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="glass-card">
            <div style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #e07070;">Low Stock Items</div>
            <div id="stat-low" style="font-size: 2rem; font-family: 'Playfair Display';">--</div>
        </div>
    </div>
</div>

<div class="glass-card">
    <h3 style="margin-bottom: 1.5rem; font-size: 1.1rem;">Active Inventory</h3>
    <table class="table" style="color: var(--cream); border-color: var(--border);">
        <thead>
            <tr style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">
                <th>Book Details</th>
                <th>Grade/Subject</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="inventory-body">
            </tbody>
    </table>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let allBooks = [];

    // Fetch Dashboard Data
    fetch('/api/dashboard')
        .then(res => res.json())
        .then(data => {
            document.getElementById('stat-total').textContent = data.total_books;
            document.getElementById('stat-value').textContent = '$' + data.total_value.toLocaleString();
            // Assuming data.books is returned in the API
            renderTable(data.books);
            allBooks = data.books;
        });

    function renderTable(books) {
        const body = document.getElementById('inventory-body');
        const search = document.getElementById('dashSearch').value.toLowerCase();
        const grade = document.getElementById('gradeFilter').value;
        const subject = document.getElementById('subjectFilter').value;

        const filtered = books.filter(b => {
            const matchesSearch = b.title.toLowerCase().includes(search) || b.author.toLowerCase().includes(search);
            const matchesGrade = !grade || b.grade === grade;
            const matchesSubject = !subject || b.subject === subject;
            return matchesSearch && matchesGrade && matchesSubject;
        });

        body.innerHTML = filtered.map(b => `
            <tr style="border-bottom: 1px solid var(--border2); transition: var(--transition);">
                <td style="padding: 1rem 0;">
                    <div style="font-weight: 500;">${b.title}</div>
                    <div style="font-size: 0.8rem; color: var(--text-muted);">${b.author}</div>
                </td>
                <td><span style="font-size: 0.8rem;">${b.grade} / ${b.subject}</span></td>
                <td><span style="color: ${b.quantity < 5 ? '#e07070' : 'var(--cream)'}">${b.quantity}</span></td>
                <td>$${b.price}</td>
            </tr>
        `).join('');
    }

    // Event Listeners for Filters
    ['dashSearch', 'gradeFilter', 'subjectFilter'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => renderTable(allBooks));
    });
});
</script>
{% endblock %}
