{% extends "base.html" %}

{% block main %}
<style>
    .pw-wrap { max-width: 400px; }

    .pw-card {
        background: var(--ink2);
        border: 1px solid var(--border);
        padding: 2.5rem;
    }

    .pw-rules {
        margin-top: 1.5rem;
        padding: 1rem 1.25rem;
        background: rgba(200,151,58,0.06);
        border-left: 2px solid rgba(200,151,58,0.3);
    }

    .pw-rules-title {
        font-size: .6rem;
        letter-spacing: .14em;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 500;
        margin-bottom: .6rem;
    }

    .pw-rules ul { list-style: none; }

    .pw-rules li {
        font-size: .775rem;
        color: var(--muted);
        padding: .2rem 0;
        padding-left: .9rem;
        position: relative;
    }

    .pw-rules li::before {
        content: '—';
        position: absolute;
        left: 0;
        color: var(--gold);
        opacity: .5;
    }

    .field { margin-bottom: 1.25rem; }

    .field label {
        display: block;
        font-size: .6rem;
        letter-spacing: .14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: .5rem;
        font-weight: 500;
    }

    .field input {
        width: 100%;
        padding: .8rem 1rem;
        background: var(--ink);
        border: 1px solid var(--border);
        color: var(--cream);
        font-family: 'DM Sans', sans-serif;
        font-size: .875rem;
        font-weight: 300;
        outline: none;
        transition: border-color .2s;
    }

    .field input:focus { border-color: var(--gold); }
</style>

<div class="page-header">
    <div>
        <div class="page-eyebrow">Account</div>
        <div class="page-title">Change Password</div>
        <div class="page-sub">Update your login credentials below.</div>
    </div>
</div>

<div class="pw-wrap">
    <div class="pw-card">
        <form method="POST">
            <div class="field">
                <label>Current Password</label>
                <input type="password" name="old_password" placeholder="Enter current password" required>
            </div>
            <div class="field">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Minimum 8 characters" required>
            </div>
            <button type="submit" class="btn-primary-dark" style="width:100%; justify-content:center;">Update Password</button>
        </form>

        <div class="pw-rules">
            <div class="pw-rules-title">Password Requirements</div>
            <ul>
                <li>At least 8 characters</li>
                <li>Must differ from your current password</li>
                <li>Avoid easily guessable combinations</li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
