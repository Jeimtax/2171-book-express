<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <title>Book Express</title>
    <style>
        :root {
            --ink:    #0e0e0e;
            --ink2:   #1a1a1a;
            --ink3:   #252525;
            --cream:  #f2ede6;
            --muted:  #8a8070;
            --gold:   #c8973a;
            --gold2:  #e8b84b;
            --border: rgba(200,151,58,0.18);
            --border2:rgba(200,151,58,0.08);
            --sidebar-w: 230px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            background: var(--ink);
            color: var(--cream);
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--ink2);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            display: flex;
            flex-direction: column;
            padding: 2rem 0;
            z-index: 100;
        }

        .brand {
            padding: 0 2rem;
            margin-bottom: 3rem;
        }

        .brand-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold);
            letter-spacing: -0.02em;
        }

        .nav-list { list-style: none; flex: 1; }
        .section-label {
            font-size: .55rem;
            text-transform: uppercase;
            letter-spacing: .2em;
            color: var(--muted);
            padding: 2rem 2rem .75rem;
            display: block;
        }

        .nav-link {
            display: block;
            padding: .75rem 2rem;
            color: var(--muted);
            text-decoration: none;
            font-size: .85rem;
            transition: all .2s;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--gold);
            background: rgba(200,151,58,0.04);
        }

        .main-content {
            margin-left: var(--sidebar-w);
            padding: 3rem 4rem;
            min-height: 100vh;
        }

        /* Generic Page Headers */
        .page-header { margin-bottom: 3rem; border-bottom: 1px solid var(--border2); padding-bottom: 1.5rem; }
        .page-eyebrow { font-size: .6rem; text-transform: uppercase; letter-spacing: .2em; color: var(--gold); margin-bottom: .5rem; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: .5rem; }
        .page-sub { font-size: .9rem; color: var(--muted); }

        /* Unified Form Styles */
        input[type="text"], input[type="number"], input[type="password"], select, textarea {
            width: 100%;
            padding: .8rem 1rem;
            background: var(--ink) !important;
            border: 1px solid var(--border) !important;
            color: var(--cream) !important;
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            outline: none;
            transition: border-color .2s;
        }
        input:focus { border-color: var(--gold) !important; }

        .btn-primary-dark {
            background: var(--gold);
            color: var(--ink);
            border: none;
            padding: .8rem 1.5rem;
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            font-weight: 500;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-primary-dark:hover { background: var(--gold2); }

        /* Flash Zone */
        .flash-zone { position: fixed; top: 2rem; right: 2rem; z-index: 9999; }
        .flash-msg {
            background: var(--ink2);
            border: 1px solid var(--gold);
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: .85rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand">
        <div class="brand-text">Book Express</div>
    </div>
    <ul class="nav-list">
        <span class="section-label">Management</span>
        <li><a href="{{ url_for('dashboard.dashboard_page') }}" class="nav-link {% if request.endpoint == 'dashboard.dashboard_page' %}active{% endif %}">Dashboard</a></li>
        <li><a href="{{ url_for('books.create') }}" class="nav-link {% if 'books' in request.endpoint %}active{% endif %}">Inventory Catalog</a></li>
        <li><a href="{{ url_for('inventory.adjust_page') }}" class="nav-link {% if 'inventory' in request.endpoint %}active{% endif %}">Manual Adjust</a></li>
        <li><a href="{{ url_for('orders.manage_orders') }}" class="nav-link {% if 'orders' in request.endpoint %}active{% endif %}">Supplier Orders</a></li>
        <li><a href="{{ url_for('upload.index') }}" class="nav-link {% if 'upload' in request.endpoint %}active{% endif %}">Import Sales</a></li>
        
        <span class="section-label">Account</span>
        <li><a href="{{ url_for('auth.logout') }}" class="nav-link">Logout</a></li>
    </ul>
</div>

<div class="main-content">
    {% with messages = get_flashed_messages(with_categories=true) %}\
      {% if messages
