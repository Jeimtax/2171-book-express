{% extends "base.html" %}

{% block main %}
<style>
    .pw-card {
        background: #fff;
        border: 1px solid #e0ddd8;
        border-radius: 8px;
        padding: 2.5rem;
        max-width: 360px;
    }

    .pw-card h2 {
        font-size: 1.5rem;
        font-weight: 400;
        margin-bottom: 1.75rem;
    }

    .pw-card label {
        display: block;
        font-size: .7rem;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: #888;
        margin-bottom: .4rem;
    }

    .pw-card input[type="password"] {
        width: 100%;
        padding: .7rem .9rem;
        border: 1px solid #e0ddd8;
        border-radius: 6px;
        background: #fff;
        font-family: 'Outfit', sans-serif;
        font-size: .9rem;
        color: #111;
        outline: none;
        margin-bottom: 1.1rem;
        box-shadow: none;
    }

    .pw-card input[type="password"]:focus {
        border-color: #111;
        box-shadow: none;
    }

    .pw-card button[type="submit"] {
        width: 100%;
        padding: .8rem;
        background: #111;
        color: #faf9f7;
        border: none;
        border-radius: 6px;
        font-family: 'Outfit', sans-serif;
        font-size: .9rem;
        font-weight: 500;
        cursor: pointer;
        letter-spacing: .04em;
    }
</style>

<div class="pw-card">
    <h2>Change Password</h2>
    <form method="POST">
        <label>Current Password</label>
        <input type="password" name="old_password" placeholder="Enter current password" required>

        <label>New Password</label>
        <input type="password" name="new_password" placeholder="Minimum 8 characters" required>

        <button type="submit">Update Password</button>
    </form>
</div>
{% endblock %}
