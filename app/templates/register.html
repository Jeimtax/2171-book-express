{% extends "base.html" %}

{% block main %}
    <h1>Register</h1>
    <form method="POST" class="mt-4" style="max-width: 400px;">
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" value="{{ username if username else '' }}" required>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p class="mt-3">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>.</p>
{% endblock %}
