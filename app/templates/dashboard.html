{% extends "base.html" %}

{% block main %}
<style>
    .dash-card {
        background: #fff;
        border: 1px solid #e0ddd8;
        border-radius: 2px;
        padding: 2.5rem;
        max-width: 520px;
    }

    .dash-card h1 {
        font-size: 1.75rem;
        font-weight: 400;
        margin-bottom: .5rem;
    }

    .dash-card .role {
        font-size: .75rem;
        color: #888;
        letter-spacing: .08em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
    }

    .dash-card p {
        font-size: .875rem;
        color: #555;
        margin-bottom: 1.75rem;
    }

    .btn-logout {
        padding: .8rem 1.5rem;
        background: #111;
        color: #faf9f7;
        border: none;
        border-radius: 2px;
        font-family: 'Outfit', sans-serif;
        font-size: .9rem;
        font-weight: 500;
        cursor: pointer;
        letter-spacing: .04em;
        text-decoration: none;
        display: inline-block;
    }
</style>

<div class="dash-card">
    <h1>Welcome, {{ user.username }}</h1>
    <div class="role">{{ user.role|capitalize }}</div>
    <p>Use the sidebar to navigate through the Book Express management system.</p>
    <a class="btn-logout" href="{{ url_for('auth.logout') }}">Logout</a>
</div>
{% endblock %}
