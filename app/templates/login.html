<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Book Express</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem 4rem;
            background: #faf9f7;
            text-align: center;
        }

        .brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #111;
            margin-bottom: .75rem;
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 400;
            color: #111;
            margin-bottom: 2rem;
        }

        .form-wrap { width: 100%; max-width: 320px; text-align: left; }

        label {
            display: block;
            font-size: .7rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: .4rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: .7rem .9rem;
            border: 1px solid #e0ddd8;
            border-radius: 2px;
            background: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: .9rem;
            color: #111;
            outline: none;
            margin-bottom: 1.1rem;
            transition: border-color .15s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus { border-color: #111; }

        .remember {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: 1.5rem;
            font-size: .85rem;
            color: #888;
        }

        input[type="checkbox"] { accent-color: #111; }

        button[type="submit"] {
            width: 100%;
            padding: .8rem;
            background: #111;
            color: #faf9f7;
            border: none;
            border-radius: 2px;
            font-family: 'Outfit', sans-serif;
            font-size: .9rem;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: .04em;
            transition: opacity .15s;
        }

        button[type="submit"]:hover { opacity: .8; }

        .register {
            text-align: center;
            margin-top: 1.25rem;
            font-size: .85rem;
            color: #888;
        }

        .register a { color: #111; font-weight: 500; }

        .right { overflow: hidden; }

        .right img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; }
            .right { display: none; }
            .left { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="left">

        <div class="brand">Book Express</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show mb-3 w-100" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <h1>Welcome back</h1>

        <div class="form-wrap">
            <form method="POST" novalidate>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>

                <div class="remember">
                    <input type="checkbox" id="remember_me" name="remember_me">
                    <label for="remember_me" style="margin:0; text-transform:none; font-size:.85rem;">Remember me</label>
                </div>

                <button type="submit">Login</button>
            </form>

            <p class="register">Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
        </div>

    </div>

    <div class="right">
        <img src="{{ url_for('static', filename='images/pexels-matteobasilephoto-8464020.jpg') }}" alt="">
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
